<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat - J.A.R.V.I.S.</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --accent: #00d2ff; --danger: #ff4b2b; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #particles { position: fixed; inset: 0; z-index: 0; }
        .container { text-align: center; z-index: 10; }
        .orb-wrap { width: 260px; height: 260px; margin: 0 auto 40px; position: relative; cursor: pointer; }
        .orb { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, var(--accent) 0%, rgba(0,210,255,.15) 70%, transparent 100%); box-shadow: 0 0 60px var(--accent); animation: pulse 2.5s ease-in-out infinite; transition: all .3s; }
        .orb-wrap.listening .orb { background: radial-gradient(circle,#00ff88 0%,rgba(0,255,136,.15) 70%,transparent 100%); box-shadow: 0 0 80px #00ff88; animation: pulse-fast 1s ease-in-out infinite; }
        .orb-wrap.speaking .orb { background: radial-gradient(circle,var(--accent) 0%,rgba(0,210,255,.3) 70%,transparent 100%); box-shadow: 0 0 100px var(--accent); animation: pulse-fast .5s ease-in-out infinite; }
        .orb-wrap.thinking .orb { background: radial-gradient(circle,#ffcc00 0%,rgba(255,204,0,.15) 70%,transparent 100%); box-shadow: 0 0 80px #ffcc00; animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:.8} 50%{transform:scale(1.05);opacity:1} }
        @keyframes pulse-fast { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        .status { font-size: 1.3rem; font-weight: 300; letter-spacing: 3px; margin-bottom: 35px; color: var(--accent); text-transform: uppercase; min-height: 2rem; }
        .tap-hint { font-size: 0.75rem; color: rgba(0,210,255,.5); letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        .end-btn { background: rgba(255,75,43,.1); border: 1px solid var(--danger); color: var(--danger); padding: 14px 40px; font-size: 1rem; border-radius: 50px; cursor: pointer; transition: all .3s; text-transform: uppercase; letter-spacing: 2px; display: inline-flex; align-items: center; gap: 10px; font-family: 'Outfit', sans-serif; }
        .end-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 0 20px var(--danger); }
        .end-btn svg { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>
    <div id="particles"></div>
    <div class="container">
        <div class="orb-wrap" id="orbWrap">
            <div class="orb"></div>
        </div>
        <div class="status" id="status">Tap orb to start</div>
        <div class="tap-hint" id="hint">tap once · then just speak</div>
        <button class="end-btn" id="endBtn">
            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            End Call
        </button>
    </div>

    <script>
    const socket = io();
    const orbWrap = document.getElementById('orbWrap');
    const statusEl = document.getElementById('status');
    const hintEl = document.getElementById('hint');
    const endBtn = document.getElementById('endBtn');

    let STATE = 'IDLE';   // IDLE | LISTENING | PROCESSING | SPEAKING
    let recognition = null;
    let active = false;   // becomes true after first orb tap

    // ── Orb tap: user gesture required by browser to access mic AND unlock TTS ──
    orbWrap.addEventListener('click', () => {
        if (active) return;
        active = true;
        hintEl.style.display = 'none';

        // CRITICAL: Prime speech synthesis INSIDE the user gesture to unlock TTS for the session.
        // Without this, Chrome blocks speechSynthesis.speak() called from socket events.
        const primer = new SpeechSynthesisUtterance(' ');
        primer.volume = 0;
        window.speechSynthesis.speak(primer);

        // Small greeting to confirm TTS is working
        setTimeout(() => {
            speak("Hello Ishita, I'm listening. How can I help you?");
        }, 300);
    });

    // ── State management ──
    function setUI(state) {
        STATE = state;
        orbWrap.className = 'orb-wrap';
        if (state === 'LISTENING') { statusEl.textContent = 'Listening...'; orbWrap.classList.add('listening'); }
        else if (state === 'PROCESSING') { statusEl.textContent = 'Thinking...'; orbWrap.classList.add('thinking'); }
        else if (state === 'SPEAKING') { statusEl.textContent = 'Speaking...'; orbWrap.classList.add('speaking'); }
        else { statusEl.textContent = 'Tap orb to start'; }
    }

    // ── Speech Recognition ──
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
        recognition = new SR();
        recognition.continuous = true;   // keep mic open — most reliable approach
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => setUI('LISTENING');

        recognition.onresult = (e) => {
            // Get the last final result
            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) {
                    const text = e.results[i][0].transcript.trim();
                    if (!text) continue;
                    console.log('[Voice] You said:', text);
                    // Stop mic while AI is thinking
                    try { recognition.stop(); } catch(_) {}
                    setUI('PROCESSING');
                    socket.emit('send_message', { text });
                }
            }
        };

        recognition.onerror = (e) => {
            console.error('[Voice] Error:', e.error);
            if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                statusEl.textContent = 'Mic blocked — allow mic access';
                active = false;
            } else if (e.error === 'no-speech') {
                // normal — just keep going
            }
        };

        recognition.onend = () => {
            // If we're in LISTENING state and recognition ended (e.g. timeout),
            // restart automatically to keep listening
            if (STATE === 'LISTENING' && active) {
                try { recognition.start(); } catch(_) {}
            }
        };
    } else {
        statusEl.textContent = 'Voice not supported in this browser';
    }

    function startListening() {
        if (!recognition || STATE === 'SPEAKING' || STATE === 'PROCESSING') return;
        setUI('LISTENING');
        try { recognition.start(); } catch(e) {
            console.warn('[Voice] start failed:', e.message);
            setTimeout(startListening, 800);
        }
    }

    // ── TTS: Jarvis speaks back ──
    function speak(text) {
        if (!window.speechSynthesis || !active) return;
        setUI('SPEAKING');
        try { recognition.stop(); } catch(_) {}
        window.speechSynthesis.cancel();

        const clean = text.replace(/[*#_`~]/g, '');
        const utt = new SpeechSynthesisUtterance(clean);
        const hindi = /[\u0900-\u097F]/.test(clean);
        utt.lang = hindi ? 'hi-IN' : 'en-US';
        utt.rate = 1.0;

        const pickVoice = () => {
            const voices = window.speechSynthesis.getVoices();
            const v = voices.find(v => v.lang.startsWith(hindi ? 'hi' : 'en') && v.name.includes('Google'))
                   || voices.find(v => v.lang.startsWith(hindi ? 'hi' : 'en'));
            if (v) utt.voice = v;
        };
        pickVoice();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = pickVoice;

        utt.onend = () => {
            if (active) setTimeout(startListening, 500);
        };
        utt.onerror = utt.onend;
        window.speechSynthesis.speak(utt);
    }

    // ── Socket ──
    socket.on('connect', () => console.log('[Voice] Connected.'));
    socket.on('bot_message', (data) => speak(data.text));

    // ── End call ──
    endBtn.onclick = () => {
        active = false;
        try { recognition.stop(); } catch(_) {}
        window.speechSynthesis.cancel();
        window.location.href = '/';
    };

    // ── Particles ──
    const cv = document.createElement('canvas');
    document.getElementById('particles').appendChild(cv);
    const cx = cv.getContext('2d');
    const resize = () => { cv.width = innerWidth; cv.height = innerHeight; };
    resize(); window.onresize = resize;
    const dots = Array.from({length:120}, () => ({
        x: Math.random()*innerWidth, y: Math.random()*innerHeight,
        r: Math.random()*1.5+.3, s: Math.random()*.4+.05
    }));
    (function frame() {
        cx.clearRect(0,0,cv.width,cv.height);
        dots.forEach(d => {
            cx.fillStyle = 'rgba(0,210,255,0.45)';
            cx.beginPath(); cx.arc(d.x, d.y, d.r, 0, 6.28); cx.fill();
            d.y -= d.s; if(d.y < 0) { d.y = cv.height; d.x = Math.random()*cv.width; }
        });
        requestAnimationFrame(frame);
    })();
    </script>
</body>
</html>
