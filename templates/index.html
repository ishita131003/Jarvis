<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. — AI Assistant</title>
    <link rel="icon" href="/static/jarvis.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #0f0f2a;
            --bg-card: rgba(15, 15, 45, 0.6);
            --border-glow: rgba(0, 180, 255, 0.15);
            --accent-cyan: #00d4ff;
            --accent-blue: #0080ff;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --user-bubble: linear-gradient(135deg, #1a1a3e, #252560);
            --bot-bubble: linear-gradient(135deg, #0d1f3c, #0a1628);
            --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
            --glow-purple: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* === ANIMATED BG GRID === */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 180, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridShift 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridShift {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(60px, 60px);
            }
        }

        /* === FLOATING PARTICLES === */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent-cyan);
            border-radius: 50%;
            opacity: 0;
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1);
            }
        }

        /* === MAIN LAYOUT === */
        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* === HEADER === */
        .header {
            text-align: center;
            padding: 20px 0 10px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .header .subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* === ORB === */
        .orb-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 0 15px;
            flex-shrink: 0;
        }

        .orb {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .orb:hover {
            transform: scale(1.05);
        }

        .orb-core {
            position: absolute;
            inset: 15px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #1a3a5c, #0a1628);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .orb-core::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.6), transparent);
            border-radius: 50%;
            animation: corePulse 2s ease-in-out infinite;
        }

        @keyframes corePulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.4);
                opacity: 1;
            }
        }

        .orb-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(0, 212, 255, 0.2);
            animation: orbRotate 8s linear infinite;
        }

        .orb-ring::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-cyan);
        }

        .orb-ring-2 {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(139, 92, 246, 0.15);
            animation: orbRotate 12s linear infinite reverse;
        }

        .orb-ring-2::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--accent-purple);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-purple);
        }

        .orb-glow {
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08), transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes orbRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.15);
            }
        }

        /* Orb States */
        .orb.listening .orb-core::after {
            background: radial-gradient(circle, rgba(0, 255, 136, 0.8), transparent);
            animation: corePulse 0.6s ease-in-out infinite;
        }

        .orb.listening .orb-ring {
            border-color: rgba(0, 255, 136, 0.4);
            animation-duration: 2s;
        }

        .orb.listening .orb-glow {
            background: radial-gradient(circle, rgba(0, 255, 136, 0.15), transparent 70%);
        }

        .orb.thinking .orb-core::after {
            background: radial-gradient(circle, rgba(139, 92, 246, 0.8), transparent);
            animation: corePulse 0.4s ease-in-out infinite;
        }

        .orb.thinking .orb-ring {
            border-color: rgba(139, 92, 246, 0.4);
            animation-duration: 1s;
        }

        .orb.thinking .orb-glow {
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 70%);
        }

        .orb.speaking .orb-core::after {
            background: radial-gradient(circle, rgba(236, 72, 153, 0.8), transparent);
            animation: corePulse 0.8s ease-in-out infinite;
        }

        .orb.speaking .orb-ring {
            border-color: rgba(236, 72, 153, 0.3);
            animation-duration: 3s;
        }

        .orb.speaking .orb-glow {
            background: radial-gradient(circle, rgba(236, 72, 153, 0.12), transparent 70%);
        }

        /* === STATUS === */
        .status-bar {
            text-align: center;
            padding: 0 0 12px;
            flex-shrink: 0;
        }

        .status-text {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            transition: color 0.3s ease;
        }

        .status-text.listening {
            color: #00ff88;
        }

        .status-text.thinking {
            color: var(--accent-purple);
        }

        .status-text.speaking {
            color: var(--accent-pink);
        }

        /* === CHAT === */
        .chat-container {
            flex: 1;
            min-height: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--glow-cyan), inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.2);
            border-radius: 4px;
        }

        .message {
            max-width: 92%;
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 0.94rem;
            line-height: 1.6;
            animation: messageSlideIn 0.35s ease-out;
            position: relative;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border: 1px solid rgba(0, 128, 255, 0.15);
            border-bottom-right-radius: 4px;
            color: var(--text-primary);
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .message .label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .message.user .label {
            color: var(--accent-blue);
            text-align: right;
        }

        .message.bot .label {
            color: var(--accent-cyan);
        }

        /* === MARKDOWN RENDERING === */
        .message.bot .md-content p {
            margin: 0 0 8px;
            line-height: 1.6;
        }

        .message.bot .md-content p:last-child {
            margin-bottom: 0;
        }

        .message.bot .md-content strong {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .message.bot .md-content ol,
        .message.bot .md-content ul {
            padding-left: 1.4rem;
            margin: 6px 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message.bot .md-content li {
            line-height: 1.55;
            color: var(--text-primary);
        }

        .message.bot .md-content li strong {
            color: #7dd3fc;
        }

        .message.bot .md-content ul ul,
        .message.bot .md-content ol ul {
            margin-top: 4px;
            padding-left: 1.2rem;
            gap: 3px;
        }

        .message.bot .md-content ul li::marker {
            color: var(--accent-cyan);
        }

        .message.bot .md-content ol li::marker {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .message.bot .md-content h1,
        .message.bot .md-content h2,
        .message.bot .md-content h3 {
            color: var(--accent-cyan);
            font-size: 0.95rem;
            font-weight: 600;
            margin: 10px 0 6px;
            letter-spacing: 0.5px;
        }

        .message.bot .md-content code {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            color: #7dd3fc;
        }

        .message.bot .md-content hr {
            border: none;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            margin: 8px 0;
        }

        .welcome-message {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 30px 20px;
            line-height: 1.7;
        }

        .welcome-message .icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        /* === INPUT === */
        .input-container {
            padding: 14px 16px;
            border-top: 1px solid rgba(0, 180, 255, 0.08);
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(10, 10, 30, 0.5);
            border-radius: 0 0 20px 20px;
        }

        .text-input {
            flex: 1;
            background: rgba(15, 15, 40, 0.8);
            border: 1px solid rgba(0, 180, 255, 0.12);
            border-radius: 12px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .text-input::placeholder {
            color: var(--text-muted);
        }

        .text-input:focus {
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }

        /* === MIC BUTTON === */
        .mic-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 212, 255, 0.08);
            color: var(--accent-cyan);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
        }

        .mic-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            transform: scale(1.05);
        }

        .mic-btn.active {
            background: rgba(0, 255, 136, 0.15);
            border-color: rgba(0, 255, 136, 0.5);
            color: #00ff88;
            animation: micPulse 1.5s ease-in-out infinite;
        }

        @keyframes micPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.3);
            }

            50% {
                box-shadow: 0 0 0 12px rgba(0, 255, 136, 0);
            }
        }

        .mic-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* === SEND BUTTON === */
        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(0, 128, 255, 0.3);
            background: rgba(0, 128, 255, 0.08);
            color: var(--accent-blue);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: rgba(0, 128, 255, 0.2);
            border-color: rgba(0, 128, 255, 0.5);
            box-shadow: 0 0 18px rgba(0, 128, 255, 0.2);
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* === THINKING DOTS === */
        .thinking-indicator {
            display: none;
            align-self: flex-start;
            padding: 14px 20px;
            background: var(--bot-bubble);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            gap: 5px;
        }

        .thinking-indicator.active {
            display: flex;
        }

        .thinking-dot {
            width: 7px;
            height: 7px;
            background: var(--accent-purple);
            border-radius: 50%;
            animation: thinkBounce 1.4s ease-in-out infinite;
        }

        .thinking-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes thinkBounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* === RESPONSIVE === */
        @media (max-width: 600px) {
            .app-container {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.2rem;
                letter-spacing: 5px;
            }

            .orb {
                width: 80px;
                height: 80px;
            }

            .message {
                max-width: 90%;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-grid"></div>

    <div class="particles" id="particles"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>J.A.R.V.I.S.</h1>
            <div class="subtitle">Just A Rather Very Intelligent System</div>
        </header>

        <!-- Animated Orb -->
        <div class="orb-container">
            <div class="orb" id="orb" title="Click to start listening">
                <div class="orb-glow"></div>
                <div class="orb-ring-2"></div>
                <div class="orb-ring"></div>
                <div class="orb-core"></div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <span class="status-text" id="statusText">Initializing...</span>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <span class="icon">⚡</span>
                    <strong>Welcome, Ishita.</strong><br>
                    Click the microphone or type a message below to begin.<br>
                    <span style="color: var(--text-muted); font-size: 0.78rem;">
                        I can answer questions, open apps, and more.
                    </span>
                </div>
            </div>

            <!-- Thinking Dots -->
            <div class="thinking-indicator" id="thinkingIndicator">
                <div class="thinking-dot"></div>
                <div class="thinking-dot"></div>
                <div class="thinking-dot"></div>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <button class="mic-btn" id="micBtn" title="Start Listening">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                    </svg>
                </button>
                <input type="text" class="text-input" id="textInput" placeholder="Type your message..."
                    autocomplete="off">
                <button class="send-btn" id="sendBtn" title="Send Message">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== PARTICLES =====
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (8 + Math.random() * 15) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
                container.appendChild(p);
            }
        })();

        // ===== SOCKET.IO =====
        const socket = io();
        const chatMessages = document.getElementById('chatMessages');
        const statusText = document.getElementById('statusText');
        const orb = document.getElementById('orb');
        const micBtn = document.getElementById('micBtn');
        const sendBtn = document.getElementById('sendBtn');
        const textInput = document.getElementById('textInput');
        const thinkingIndicator = document.getElementById('thinkingIndicator');

        let isListening = false;

        // --- Status Updates ---
        socket.on('status', (data) => {
            statusText.textContent = data.message;
            statusText.className = 'status-text ' + data.state;

            // Update orb state
            orb.className = 'orb';
            if (data.state !== 'idle' && data.state !== 'goodbye') {
                orb.classList.add(data.state);
            }

            // Mic button state
            if (data.state === 'listening') {
                micBtn.classList.add('active');
                isListening = true;
            } else {
                micBtn.classList.remove('active');
                isListening = false;
            }

            // Thinking dots
            thinkingIndicator.classList.toggle('active', data.state === 'thinking');
        });

        // --- Messages ---
        socket.on('user_message', (data) => {
            addMessage(data.text, 'user');
        });

        socket.on('bot_message', (data) => {
            thinkingIndicator.classList.remove('active');
            addMessage(data.text, 'bot');
        });

        // Configure marked for safe, clean output
        marked.setOptions({
            breaks: true,      // line breaks become <br>
            gfm: true,         // GitHub Flavored Markdown
        });

        function addMessage(text, type) {
            // Remove welcome message if present
            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const msg = document.createElement('div');
            msg.className = 'message ' + type;

            const label = document.createElement('span');
            label.className = 'label';
            label.textContent = type === 'user' ? 'You' : 'Jarvis';

            msg.appendChild(label);

            if (type === 'bot') {
                // Render bot messages as markdown HTML
                const mdDiv = document.createElement('div');
                mdDiv.className = 'md-content';
                mdDiv.innerHTML = marked.parse(text);
                msg.appendChild(mdDiv);
            } else {
                // User messages: plain text
                const content = document.createElement('span');
                content.textContent = text;
                msg.appendChild(content);
            }

            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- Mic Button ---
        micBtn.addEventListener('click', () => {
            if (!isListening) {
                socket.emit('start_listening');
            }
        });

        // Orb also triggers listening
        orb.addEventListener('click', () => {
            if (!isListening) {
                socket.emit('start_listening');
            }
        });

        // --- Text Send ---
        sendBtn.addEventListener('click', sendText);
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendText();
            }
        });

        function sendText() {
            const text = textInput.value.trim();
            if (!text) return;
            socket.emit('send_message', { text });
            textInput.value = '';
        }

        // --- Connection Status ---
        socket.on('connect', () => {
            console.log('Connected to Jarvis');
        });

        socket.on('disconnect', () => {
            statusText.textContent = 'Disconnected';
            statusText.className = 'status-text';
            orb.className = 'orb';
        });
    </script>

</body>

</html>
